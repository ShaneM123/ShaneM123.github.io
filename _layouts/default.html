<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Shane Moloney" }} | Software Developer</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #222;
        }

        nav {
            background: #f8f9fa;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            color: #0066cc;
        }

        h1,
        h2 {
            color: #111;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: white;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            margin: 5px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 20px;
        }

        .filter-btn.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #666;
        }

        #page {
            display: flex;
            min-height: 100vh;
            max-width: none;
            margin: 0;
            padding: 0;
        }

        #sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #f8f9fa;
            border-right: 1px solid #e5e5e5;
            padding: 24px 18px;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #sidebar .sidebar-header {
            margin-bottom: 24px;
        }

        #sidebar .sidebar-header h1 {
            font-size: 1.25rem;
            margin: 0 0 4px 0;
            color: #111;
            font-weight: 600;
            line-height: 1.2;
        }

        #sidebar .sidebar-header p {
            margin: 0;
            font-size: 0.875rem;
            color: #555;
            line-height: 1.4;
        }

        #sidebar nav ul {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
        }

        #sidebar nav li {
            margin-bottom: 3px;
        }

        #sidebar nav a {
            display: contents;
            padding: 8px 12px;
            color: #333;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            border-left: 3px solid transparent;
            box-sizing: border-box;
            transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease;
        }

        #sidebar nav a:hover {
            background-color: #f0f0f0;
            border-left-color: #ccc;
        }

        #sidebar nav a.active {
            background-color: #e8f0fe;
            color: #0066cc;
            border-left-color: #0066cc;
        }

        #sidebar .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        #sidebar .sidebar-footer a {
            color: #444;
            text-decoration: none;
        }

        #sidebar .sidebar-footer a:hover {
            color: #0066cc;
            text-decoration: underline;
        }

        #main-content {
            flex: 1;
            min-width: 0;
            padding: 20px 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Mobile */
        @media (max-width: 768px) {
            #page {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid #e5e5e5;
                padding: 16px 18px;
            }

            #main-content {
                padding: 20px;
                max-width: 100%;
            }
        }

        @media print {
            #sidebar {
                display: none !important;
            }

            #page {
                display: block;
            }

            #main-content {
                flex: none;
                width: 100%;
                padding: 20px;
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <div id="page">
        <div id="sidebar">
            {% include sidebar.html %}
        </div>

        <div id="main-content">
            <main>
                {{ content }}
            </main>

            <footer>
                &copy; {{ 'now' | date: "%Y" }} Shane Moloney • Built with Markdown + Jekyll
            </footer>
        </div>
    </div>

    <script>
        // Active nav highlighting for sidebar (same logic as cv layout)
        (function () {
            var links = document.querySelectorAll('#sidebar nav a');
            var path = window.location.pathname.replace(/\/$/, '') || '/';

            links.forEach(function (link) {
                var href = link.getAttribute('href').replace(/\/$/, '') || '/';
                if (href === path) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</body>

</html>
