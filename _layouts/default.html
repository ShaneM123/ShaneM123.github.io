<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Shane Moloney" }} | Software Developer</title>
    <style>
        /* Clean, simple styling - feel free to tweak */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #222;
        }

        nav {
            background: #f8f9fa;
            padding: 12px 20px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            color: #0066cc;
        }

        h1,
        h2 {
            color: #111;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: white;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            margin: 5px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 20px;
        }

        .filter-btn.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>

<body>
    <!-- Simple Navigation Bar -->
    <nav>
        <a href="/">Home</a>
        <a href="/cv/">CV</a>
        <a href="/portfolio/">Portfolio</a>
        <a href="/blog/">Blog</a>
        <!-- Add more if you want (e.g. Contact) -->
    </nav>

    <main>
        {{ content }}
    </main>

    <footer>
        &copy; {{ 'now' | date: "%Y" }} Shane Moloney • Built with Markdown + Jekyll
    </footer>

    <script>
        // Very lightweight active nav highlighting (optional but nice)
        document.querySelectorAll('nav a').forEach(link => {
            if (link.getAttribute('href') === window.location.pathname ||
                (link.getAttribute('href') === '/' && window.location.pathname === '/')) {
                link.classList.add('active');
            }
        });
    </script>
</body>

</html>
